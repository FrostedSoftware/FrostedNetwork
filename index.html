<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrostedNetwork</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Inter, sans-serif;}

body {
  background:#0f1117;
  color:white;
  overflow-x:hidden;
}

/* NAV */
.nav {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:60px;
  background:#151821;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  z-index:1000;
}

.logo {
  font-weight:700;
  font-size:20px;
  color:#00d1ff;
  cursor:pointer;
}

/* FIXED BUTTON LAYOUT */
.nav-buttons {
  display:flex;
  gap:10px;
}

.nav-buttons button {
  background:#00d1ff;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  transition:0.25s;
}

.nav-buttons button:hover {
  transform:scale(1.05);
  box-shadow:0 0 10px #00d1ff;
}

/* HERO */
.hero {
  margin-top:60px;
  min-height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation:fadeIn 0.6s ease;
}

.hero h1 {
  font-size:3rem;
  margin-bottom:10px;
}

.hero p {
  color:#aaa;
  margin-bottom:20px;
}

/* SCRIPT BOX */
.script-box {
  width:90%;
  max-width:700px;
  background:#1a1d26;
  border-radius:12px;
  padding:12px;
  color:#00ffcc;
  font-family:monospace;
  margin-bottom:15px;
  overflow-x:auto;
  border:1px solid #00d1ff33;
}

/* BUTTONS */
.copy-btn, .discord-btn {
  padding:12px 18px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  margin:5px;
  transition:0.25s;
}

.copy-btn {
  background:#00d1ff;
}

.discord-btn {
  background:#5865F2;
}

.copy-btn:hover, .discord-btn:hover {
  transform:scale(1.07);
  box-shadow:0 0 12px rgba(0,209,255,0.5);
}

/* PAGE */
.page {
  display:none;
  padding:100px 20px 60px;
  max-width:1000px;
  margin:auto;
  animation:fadeIn 0.4s ease;
}

.page.active {display:block;}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}

.card {
  background:#1a1d26;
  padding:15px;
  border-radius:15px;
  cursor:pointer;
  transition:0.25s;
}

.card:hover {
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 0 20px rgba(0,209,255,0.5);
}

/* OVERLAY */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#0f1117;
  display:none;
  flex-direction:column;
  padding:80px 20px;
  z-index:2000;
  animation:fadeIn 0.3s ease;
}

.overlay.active {display:flex;}

.back {
  color:#00d1ff;
  margin-bottom:20px;
  cursor:pointer;
}

/* FEATURES */
.feature {
  background:#1a1d26;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  transition:0.2s;
}

.feature:hover {
  background:#22263a;
}

/* UPDATE LOG */
.update {
  background:#1a1d26;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  transition:0.2s;
}

.update:hover {
  background:#22263a;
}

/* HUB */
.hub {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#1a1d26;
  padding:10px 15px;
  border-radius:12px;
  font-size:0.9em;
  animation:fadeIn 0.6s ease;
}

/* ANIM */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo" onclick="goPage('home')">FrostedNetwork</div>
  <div class="nav-buttons">
    <button onclick="goPage('games')">Scripts</button>
    <button onclick="goPage('updates')">Updates</button>
  </div>
</div>

<!-- HOME -->
<div class="hero page active" id="home">
  <h1>FrostedNetwork</h1>
  <p>One script. Every game.</p>

  <!-- SCRIPT TEXTBOX -->
  <div class="script-box" id="scriptBox"></div>

  <button class="copy-btn" onclick="copyUniversal()">Copy Script</button>
  <button class="discord-btn" onclick="joinDiscord()">Join Discord</button>

  <p style="margin-top:15px;color:#666;">Last updated: March 18, 2026</p>
</div>

<!-- GAMES -->
<div class="page" id="games">
  <h2>Supported Games</h2>

  <div class="grid" style="margin-top:15px;">
    <div class="card" onclick="openGame('mm2')">
      <h3>MM2</h3>
      <p>Coin farm, ESP, utilities</p>
    </div>
  </div>
</div>

<!-- UPDATES -->
<div class="page" id="updates">
  <h2>Update Log</h2>

  <div class="update">
    <strong>March 18, 2026</strong>
    <p>Initial release of FrostedNetwork hub.</p>
  </div>

  <div class="update">
    <strong>March 17, 2026</strong>
    <p>Universal script system created.</p>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="gameView">
  <div class="back" onclick="closeGame()">← Back</div>
  <h2 id="gameTitle"></h2>
  <div id="features"></div>

  <br>
  <div class="script-box" id="overlayScript"></div>

  <button class="copy-btn" onclick="copyUniversal()">Copy Script</button>
  <button class="discord-btn" onclick="joinDiscord()">Discord</button>
</div>

<!-- HUB -->
<div class="hub">
  FrostedNetwork • Active
</div>

<script>

const SCRIPT = `loadstring(game:HttpGet("https://yourlinkhere"))()`;

/* SET TEXTBOX CONTENT */
document.getElementById("scriptBox").innerText = SCRIPT;
document.getElementById("overlayScript").innerText = SCRIPT;

function copyUniversal(){
  navigator.clipboard.writeText(SCRIPT);
  alert("Copied script");
}

function joinDiscord(){
  window.open("https://discord.gg/FvfH8N9cDA","_blank");
}

function goPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

const games = {
  mm2: {
    name:"Murder Mystery 2",
    features:[
      "Auto Coin Farm",
      "ESP",
      "Murderer Detection",
      "Speed Mods"
    ]
  }
};

function openGame(id){
  const g = games[id];
  document.getElementById("gameTitle").innerText = g.name;

  const container = document.getElementById("features");
  container.innerHTML = "";

  g.features.forEach(f=>{
    const div = document.createElement("div");
    div.className = "feature";
    div.innerText = f;
    container.appendChild(div);
  });

  document.getElementById("gameView").classList.add("active");
}

function closeGame(){
  document.getElementById("gameView").classList.remove("active");
}

</script>

</body>
</html>
