<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrostedNetwork</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Inter, sans-serif;}

body {
  background:#0f1117;
  color:white;
  overflow-x:hidden;
}

/* NAVBAR */
.nav {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:60px;
  background:#151821;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  z-index:1000;
}

.logo {
  font-weight:700;
  font-size:20px;
  color:#00d1ff;
}

.nav button {
  background:#00d1ff;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* HERO (homepage like modrinth) */
.hero {
  margin-top:60px;
  height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation:fadeIn 0.6s ease;
}

.hero h1 {
  font-size:3rem;
  margin-bottom:10px;
}

.hero p {
  color:#aaa;
  margin-bottom:20px;
}

.copy-btn {
  background:#00d1ff;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}
.copy-btn:hover {
  transform:scale(1.05);
}

/* PAGE CONTAINER */
.page {
  display:none;
  padding:100px 20px 40px;
  max-width:1000px;
  margin:auto;
}

.page.active {
  display:block;
  animation:fadeIn 0.4s ease;
}

/* GAME GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}

.card {
  background:#1a1d26;
  padding:15px;
  border-radius:15px;
  cursor:pointer;
  transition:0.25s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 15px rgba(0,209,255,0.4);
}

.card h3 {margin-bottom:5px;}
.card p {color:#aaa;font-size:0.9em;}

/* OVERLAY PAGE */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#0f1117;
  display:none;
  flex-direction:column;
  padding:80px 20px;
  z-index:2000;
}

.overlay.active {
  display:flex;
  animation:fadeIn 0.3s ease;
}

.back {
  margin-bottom:20px;
  cursor:pointer;
  color:#00d1ff;
}

.feature {
  background:#1a1d26;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

/* HUB STATUS */
.hub {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#1a1d26;
  padding:10px 15px;
  border-radius:12px;
  font-size:0.9em;
  color:#aaa;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">FrostedNetwork</div>
  <button onclick="goPage('games')">Scripts</button>
</div>

<!-- HOME -->
<div class="hero page active" id="home">
  <h1>FrostedNetwork</h1>
  <p>Universal Roblox script hub. One script. All games.</p>
  <button class="copy-btn" onclick="copyUniversal()">Copy Universal Script</button>
</div>

<!-- GAMES PAGE -->
<div class="page" id="games">
  <h2 style="margin-bottom:15px;">Supported Games</h2>

  <div class="grid">

    <div class="card" onclick="openGame('mm2')">
      <h3>MM2</h3>
      <p>Coin farming, ESP, utilities</p>
    </div>

    <div class="card" onclick="openGame('arsenal')">
      <h3>Arsenal</h3>
      <p>Aimbot, ESP, movement</p>
    </div>

  </div>
</div>

<!-- GAME OVERLAY -->
<div class="overlay" id="gameView">
  <div class="back" onclick="closeGame()">← Back</div>
  <h2 id="gameTitle"></h2>

  <div id="features"></div>
</div>

<!-- HUB STATUS -->
<div class="hub">
  FrostedNetwork • Universal Script Ready
</div>

<script>

/* UNIVERSAL SCRIPT */
const UNIVERSAL_SCRIPT = `loadstring(game:HttpGet("https://yourlinkhere"))()`;

/* COPY */
function copyUniversal(){
  navigator.clipboard.writeText(UNIVERSAL_SCRIPT);
  alert("Copied universal script");
}

/* PAGE NAV */
function goPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* GAME DATA */
const games = {
  mm2: {
    name:"Murder Mystery 2",
    features:[
      "Auto Coin Farm",
      "Player ESP",
      "Murderer Detection",
      "Speed Utilities"
    ]
  },
  arsenal: {
    name:"Arsenal",
    features:[
      "Aimbot",
      "ESP",
      "Triggerbot",
      "Movement Mods"
    ]
  }
};

/* OPEN GAME PAGE */
function openGame(id){
  const game = games[id];
  document.getElementById("gameTitle").innerText = game.name;

  const container = document.getElementById("features");
  container.innerHTML = "";

  game.features.forEach(f=>{
    const div = document.createElement("div");
    div.className = "feature";
    div.innerText = f;
    container.appendChild(div);
  });

  document.getElementById("gameView").classList.add("active");
}

/* CLOSE */
function closeGame(){
  document.getElementById("gameView").classList.remove("active");
}

</script>

</body>
</html>
